name: macOS ARM64 Build & Test

# Modeled after ext/async/.github/workflows/build-macos.yml. Same idea:
# clone php-src + ext/async, copy this repo into ext/http_server/,
# build the whole PHP statically with --enable-http-server. Avoids the
# phpize/shared-extension dance on platforms where the deps stack is
# brittle.
#
# Skipped vs. Linux CI:
#   - HTTP/3 (no prebuilt ngtcp2/nghttp3 on brew — building from source
#     against OpenSSL 3.5 native QUIC is a separate effort).
#   - io_uring (Linux-only by construction).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PHP_SRC_BRANCH: true-async
  PHP_ASYNC_BRANCH: main

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        debug: [false, true]
        zts:   [true]
        # macOS 15 Intel temporarily disabled — Clang 17 musttail bug
        # (same reason as ext/async).
        os: ['14']

    name: "MACOS_ARM64_${{ matrix.debug && 'DEBUG' || 'RELEASE' }}_${{ matrix.zts && 'ZTS' || 'NTS' }}"
    runs-on: macos-${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout http_server
        uses: actions/checkout@v5
        with:
          path: http-server

      - name: Clone php-src (true-async)
        run: |
          git clone --depth=1 --branch="$PHP_SRC_BRANCH" \
            https://github.com/true-async/php-src php-src

      - name: Clone ext/async
        run: |
          git clone --depth=1 --branch="$PHP_ASYNC_BRANCH" \
            https://github.com/true-async/php-async php-src/ext/async

      - name: Copy http_server into ext/
        run: |
          mkdir -p php-src/ext/http_server
          # Use a tarball pipe to skip .git and any local build artifacts.
          tar -C http-server \
              --exclude='.git' --exclude='build' --exclude='modules' \
              --exclude='cmake-build-*' --exclude='_arena_repro' \
              --exclude='_bench_ph1' --exclude='coverage' \
              -cf - . | tar -C php-src/ext/http_server -xf -

      - name: Install build dependencies (Homebrew)
        run: |
          set -x
          brew update >/dev/null
          # Patch brew to overwrite always (mirrors ext/async workflow).
          formula_installer="$(brew --repo)"/Library/Homebrew/formula_installer.rb
          code=" keg.link\(verbose: verbose\?"
          sudo sed -Ei '' "s/$code.*/$code, overwrite: true\)/" "$formula_installer"

          brew reinstall autoconf libsodium icu4c curl openssl@3
          brew install bison re2c nghttp2 libuv \
                       libxml2 libiconv

      - name: Configure PHP (+ http_server statically)
        working-directory: php-src
        run: |
          set -x
          BREW_OPT="$(brew --prefix)/opt"
          export PATH="$BREW_OPT/bison/bin:$PATH"
          export PKG_CONFIG_PATH="$BREW_OPT/openssl@3/lib/pkgconfig:$BREW_OPT/curl/lib/pkgconfig:$BREW_OPT/libxml2/lib/pkgconfig:$BREW_OPT/icu4c/lib/pkgconfig:$BREW_OPT/libuv/lib/pkgconfig:$BREW_OPT/nghttp2/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          # Some brew curl pkgconfig pulls private requires that confuse
          # the PHP configure macro chain — strip like ext/async does.
          sed -i -e 's/Requires.private:.*//g' "$BREW_OPT/curl/lib/pkgconfig/libcurl.pc"

          ./buildconf --force
          ./configure \
            --enable-option-checking=fatal \
            --prefix=/usr/local \
            --disable-all \
            --without-pear \
            --enable-async \
            --enable-pdo \
            --with-pdo-sqlite \
            --enable-sockets \
            --enable-posix \
            --enable-pcntl \
            --enable-opcache \
            --enable-mbstring \
            --with-openssl \
            --with-curl \
            --with-config-file-path=/etc \
            --with-config-file-scan-dir=/etc/php.d \
            --${{ matrix.debug && 'enable' || 'disable' }}-debug \
            --${{ matrix.zts && 'enable' || 'disable' }}-zts \
            --enable-http-server \
            --enable-http2 \
            --disable-http3 \
            --with-nghttp2="$BREW_OPT/nghttp2"

      - name: Build PHP + http_server
        working-directory: php-src
        run: |
          export PATH="$(brew --prefix)/opt/bison/bin:$PATH"
          make -j"$(sysctl -n hw.logicalcpu)" >/dev/null

      - name: Install PHP
        working-directory: php-src
        run: sudo make install

      - name: Show PHP info
        run: |
          /usr/local/bin/php -v
          /usr/local/bin/php -m | grep -iE 'async|http_server|openssl|curl' || true
          /usr/local/bin/php --ri true_async_server || true

      - name: Run http_server phpt suite
        working-directory: php-src/ext/http_server
        run: |
          /usr/local/bin/php "$GITHUB_WORKSPACE/php-src/run-tests.php" \
            -P -q -j"$(sysctl -n hw.logicalcpu)" \
            -g FAIL,BORK,LEAK,XLEAK \
            --no-progress \
            --offline \
            --show-diff \
            --show-slow 4000 \
            --set-timeout 120 \
            tests/phpt

      - name: Upload failing test artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: phpt-failures-macos-${{ matrix.debug && 'debug' || 'release' }}-${{ github.run_id }}
          path: |
            php-src/ext/http_server/tests/phpt/**/*.out
            php-src/ext/http_server/tests/phpt/**/*.diff
            php-src/ext/http_server/tests/phpt/**/*.log
          if-no-files-found: ignore
          retention-days: 7
