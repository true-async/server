name: macOS ARM64 Build & Test

# Mirrors build-linux.yml: build PHP base separately (true-async branch
# requires a specific allowlist for main/internal_functions_cli.c), then
# phpize + build http_server as a shared extension. Embedding the
# extension into the PHP build directly fights internal_functions_cli.c
# expectations on this branch.
#
# Skipped vs. Linux: HTTP/3 (no prebuilt ngtcp2/nghttp3 stack on brew).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PHP_SRC_BRANCH: true-async
  PHP_ASYNC_BRANCH: main

jobs:
  build-macos:
    strategy:
      fail-fast: false
      matrix:
        debug: [false, true]
        zts:   [true]
        os: ['14']

    name: "MACOS_ARM64_${{ matrix.debug && 'DEBUG' || 'RELEASE' }}_${{ matrix.zts && 'ZTS' || 'NTS' }}"
    runs-on: macos-${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - name: Checkout http_server
        uses: actions/checkout@v5
        with:
          path: http-server

      - name: Clone php-src (true-async) + ext/async
        run: |
          git clone --depth=1 --branch="$PHP_SRC_BRANCH" \
            https://github.com/true-async/php-src php-src
          git clone --depth=1 --branch="$PHP_ASYNC_BRANCH" \
            https://github.com/true-async/php-async php-src/ext/async

      - name: Install build dependencies (Homebrew)
        run: |
          set -x
          brew update >/dev/null
          formula_installer="$(brew --repo)"/Library/Homebrew/formula_installer.rb
          code=" keg.link\(verbose: verbose\?"
          sudo sed -Ei '' "s/$code.*/$code, overwrite: true\)/" "$formula_installer"

          brew reinstall autoconf libsodium icu4c curl openssl@3
          brew install bison re2c nghttp2 libuv libxml2 libiconv

      # --------------------------------------------------------------
      # Stage A: build & install PHP base, no http_server.
      # Same allowlist as build-linux.yml — true-async's hand-edited
      # main/internal_functions_cli.c expects exactly this set.
      # --------------------------------------------------------------
      - name: Configure PHP base
        working-directory: php-src
        run: |
          set -x
          BREW_OPT="$(brew --prefix)/opt"
          export PATH="$BREW_OPT/bison/bin:$PATH"
          export PKG_CONFIG_PATH="$BREW_OPT/openssl@3/lib/pkgconfig:$BREW_OPT/curl/lib/pkgconfig:$BREW_OPT/libxml2/lib/pkgconfig:$BREW_OPT/icu4c/lib/pkgconfig:$BREW_OPT/libuv/lib/pkgconfig:$BREW_OPT/nghttp2/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          sed -i -e 's/Requires.private:.*//g' "$BREW_OPT/curl/lib/pkgconfig/libcurl.pc"

          ./buildconf --force
          ./configure \
            --prefix=/usr/local \
            --disable-all \
            --without-pear \
            --enable-async \
            --enable-pdo \
            --with-pdo-mysql=mysqlnd \
            --with-pdo-sqlite \
            --enable-sockets \
            --enable-posix \
            --enable-pcntl \
            --enable-opcache \
            --with-openssl \
            --with-config-file-path=/etc \
            --with-config-file-scan-dir=/etc/php.d \
            --${{ matrix.debug && 'enable' || 'disable' }}-debug \
            --${{ matrix.zts && 'enable' || 'disable' }}-zts

      - name: Build & install PHP base
        working-directory: php-src
        run: |
          export PATH="$(brew --prefix)/opt/bison/bin:$PATH"
          make -j"$(sysctl -n hw.logicalcpu)" >/dev/null
          sudo make install
          sudo mkdir -p /etc/php.d
          echo "opcache.enable_cli=1" | sudo tee /etc/php.d/opcache.ini

      - name: Show PHP info
        run: |
          /usr/local/bin/php -v
          /usr/local/bin/php -m | grep -iE 'async|openssl' || true

      # --------------------------------------------------------------
      # Stage B: phpize + build http_server as shared extension.
      # --------------------------------------------------------------
      - name: phpize http_server
        working-directory: http-server
        run: /usr/local/bin/phpize

      - name: Configure http_server
        working-directory: http-server
        run: |
          set -x
          BREW_OPT="$(brew --prefix)/opt"
          export PKG_CONFIG_PATH="$BREW_OPT/openssl@3/lib/pkgconfig:$BREW_OPT/nghttp2/lib/pkgconfig:$BREW_OPT/libuv/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          ./configure \
            --with-php-config=/usr/local/bin/php-config \
            --enable-http-server \
            --enable-http2 \
            --disable-http3 \
            --with-openssl \
            --with-nghttp2="$BREW_OPT/nghttp2"

      - name: Build & install http_server
        working-directory: http-server
        run: |
          make -j"$(sysctl -n hw.logicalcpu)"
          sudo make install
          echo "extension=true_async_server.so" | sudo tee /etc/php.d/true_async_server.ini

      - name: Verify http_server loads
        run: |
          /usr/local/bin/php -m | grep -i 'true_async_server'
          /usr/local/bin/php --ri true_async_server || true

      - name: Run http_server phpt suite
        working-directory: http-server
        run: |
          /usr/local/bin/php "$GITHUB_WORKSPACE/php-src/run-tests.php" \
            -P -q -j"$(sysctl -n hw.logicalcpu)" \
            -g FAIL,BORK,LEAK,XLEAK \
            --no-progress \
            --offline \
            --show-diff \
            --show-slow 4000 \
            --set-timeout 120 \
            tests/phpt

      - name: Collect crash backtraces
        if: failure()
        run: |
          dest="$GITHUB_WORKSPACE/http-server/tests/phpt/crash-reports"
          mkdir -p "$dest"
          # macOS writes a per-crash report (.ips on 12+, .crash on older) with a
          # symbolicated backtrace to DiagnosticReports; grab the recent php ones.
          for d in "$HOME/Library/Logs/DiagnosticReports" /Library/Logs/DiagnosticReports; do
            [ -d "$d" ] || continue
            find "$d" -name 'php-*' -newermt '-30 minutes' 2>/dev/null | while read -r f; do
              echo "==================== $f ===================="
              cat "$f"
              cp "$f" "$dest/" 2>/dev/null || true
            done
          done
          ls -la "$dest" 2>/dev/null || echo "no crash reports found"

      - name: Upload failing test artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: phpt-failures-macos-${{ matrix.debug && 'debug' || 'release' }}-${{ github.run_id }}
          path: |
            http-server/tests/phpt/**/*.out
            http-server/tests/phpt/**/*.diff
            http-server/tests/phpt/**/*.log
            http-server/tests/phpt/crash-reports/*
          if-no-files-found: ignore
          retention-days: 7
